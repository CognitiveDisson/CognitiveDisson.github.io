<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <title>Post</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Personal portfolio and blog of CognitiveDisson - Software Developer">
    <meta name="theme-color" content="#157878">
    <link rel="stylesheet" type="text/css" href="stylesheets/normalize.css" media="screen">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" type="text/css" href="stylesheets/custom.css" media="screen">
  </head>
  <body class="post-page">
    <main class="main-content">
      <section id="hero" class="hero-section">
        <div class="placeholder placeholder-title"></div>
        <div class="placeholder placeholder-text"></div>
        <div class="placeholder placeholder-text short"></div>
      </section>
      <article id="post-content" class="post-container">
        <!-- Post content will be loaded dynamically -->
      </article>
    </main>

    <footer class="site-footer">
      <span class="site-footer-credits" id="footer-credits">
        <!-- Footer content will be loaded dynamically -->
      </span>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="scripts/animations.js"></script>
    <script src="scripts/utils.js"></script>
    <script src="scripts/post-loader.js"></script>
  </body>
</html>
